    <rect x="15" y="12" width="2" height="9" fill="#7c1d10"/>
  </g>

  <text x="600" y="305" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="82" fill="#20201c">Temperatur-Leaderboard</text>
  <text x="600" y="352" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="31" fill="#6b6457">Live-Rangliste, Karte &amp; Rekorde der Messstationen in Deutschland</text>

  <line x1="300" y1="388" x2="900" y2="388" stroke="#b7ac8f" stroke-width="3"/>
  <line x1="300" y1="394" x2="900" y2="394" stroke="#b7ac8f" stroke-width="1.5"/>

  <!-- Temperatur-Skala -->
