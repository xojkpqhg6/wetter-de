<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f4efe3"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#b7ac8f" stroke-width="2"/>

