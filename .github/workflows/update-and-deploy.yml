name: Update & Deploy

# Stündlich neue DWD-Werte ziehen, Daten zurück-committen, Site bauen & auf
# GitHub Pages deployen. Läuft außerdem bei jedem Push auf main und manuell.
on:
  schedule:
    - cron: "7 * * * *" # stündlich, 7 min nach der vollen Stunde (UTC)
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # aktualisierte Daten zurück-committen
  pages: write # Deploy auf GitHub Pages
  id-token: write # OIDC für den Pages-Deploy

# Parallele Läufe serialisieren (kein Konflikt beim Daten-Commit / Pages-Deploy)
concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # volle Historie -> rebase beim Daten-Commit funktioniert

      - name: DWD-Daten aktualisieren
        run: bash temp-leaderboard.sh

      # Einmal täglich (≈04 UTC) das aktuelle KL-Produkt ziehen und neue Rekorde –
      # auch reiner Klimastationen, die nicht im Live-POI-Feed stehen – in
      # records.json + timeline.json mergen. Läuft nicht bei jedem Push (nur
      # geplant zur Rekord-Stunde oder manuell), damit die DWD-Last klein bleibt.
      - name: Aktuelle Rekorde nachführen (täglich)
        if: github.event_name != 'push'
        timeout-minutes: 10
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%H)" != "04" ]; then
            echo "Nicht die tägliche Rekord-Stunde (nur 04 UTC) – übersprungen."
            exit 0
          fi
          bash reference.sh --recent --jobs 8

      - name: Aktualisierte Daten committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          if git diff --cached --quiet; then
            echo "Keine Datenänderung – nichts zu committen."
            exit 0
          fi
          git commit -m "chore(data): update $(date -u +'%Y-%m-%dT%H:%MZ') [skip ci]"
          # robust gegen zwischenzeitliche Remote-Änderungen: rebase + erneut versuchen
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push ok (Versuch $attempt)"; exit 0
            fi
            echo "Push abgelehnt – rebase auf origin/main, neuer Versuch …"
            git pull --rebase --autostash origin main || exit 1
          done
          echo "Push nach 5 Versuchen fehlgeschlagen" >&2
          exit 1

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Abhängigkeiten installieren & bauen
        run: |
          npm --prefix web ci
          rm -rf web/public/data/poi   # Roh-Cache nicht mit deployen
          npm --prefix web run build

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Build-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Auf GitHub Pages deployen
        id: deploy
        uses: actions/deploy-pages@v4
